<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>本格フォト・スロット</title>
    <style>
        /* 全体のレイアウト */
        body {
            background-color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        .slot-machine {
            background: #ecf0f1;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 15px 0 #bdc3c7, 0 25px 50px rgba(0,0,0,0.5);
            text-align: center;
        }

        /* リールのコンテナ */
        .reels-container {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .reel-wrapper {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* リールの外枠 */
        .reel {
            width: 100px;
            height: 120px;
            background: #fff;
            border: 6px solid #34495e;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 画像を表示するエリア */
        .reel-content {
            width: 80px;
            height: 80px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            transition: transform 0.1s;
        }

        /* 回転中のアニメーション（ブレと揺れ） */
        .is-spinning .reel-content {
            animation: slot-blur 0.1s linear infinite;
        }

        @keyframes slot-blur {
            0% { filter: blur(0px); transform: translateY(-10px); }
            50% { filter: blur(4px); opacity: 0.6; }
            100% { filter: blur(0px); transform: translateY(10px); }
        }

        /* 操作ボタン */
        button {
            cursor: pointer;
            border: none;
            font-weight: bold;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        #spin-button {
            padding: 18px 50px;
            font-size: 24px;
            background: #e74c3c;
            color: white;
            border-radius: 60px;
            box-shadow: 0 6px 0 #c0392b;
        }

        #spin-button:hover { background: #ff5e4d; }
        
        #spin-button:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #c0392b;
        }

        #spin-button:disabled {
            background: #95a5a6;
            box-shadow: 0 6px 0 #7f8c8d;
            transform: translateY(2px);
            cursor: not-allowed;
        }

        .stop-button {
            padding: 12px;
            background: #3498db;
            color: white;
            border-radius: 8px;
            box-shadow: 0 4px 0 #2980b9;
            font-size: 14px;
        }

        .stop-button:hover:not(:disabled) { background: #5dade2; }

        .stop-button:active:not(:disabled) {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #2980b9;
        }

        .stop-button:disabled {
            background: #bdc3c7;
            box-shadow: none;
            color: #ecf0f1;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<div class="slot-machine">
    <div class="reels-container">
        <div class="reel-wrapper">
            <div class="reel" id="reel0">
                <div class="reel-content" data-value="2"></div>
            </div>
            <button class="stop-button" data-index="0" disabled>STOP</button>
        </div>
        <div class="reel-wrapper">
            <div class="reel" id="reel1">
                <div class="reel-content" data-value="2"></div>
            </div>
            <button class="stop-button" data-index="1" disabled>STOP</button>
        </div>
        <div class="reel-wrapper">
            <div class="reel" id="reel2">
                <div class="reel-content" data-value="2"></div>
            </div>
            <button class="stop-button" data-index="2" disabled>STOP</button>
        </div>
    </div>
    
    <button id="spin-button">ALL SPIN</button>
</div>

<script>
    // 使用する画像URLのリスト（フリーアイコン等）
    const itemImages = [
        'https://cdn-icons-png.flaticon.com/128/1161/1161645.png', // 0: ベル
        'https://cdn-icons-png.flaticon.com/128/1161/1161648.png', // 1: チェリー
        'https://cdn-icons-png.flaticon.com/128/1161/1161651.png', // 2: 7 (セブン)
        'https://cdn-icons-png.flaticon.com/128/1161/1161653.png', // 3: スイカ
        'https://cdn-icons-png.flaticon.com/128/1161/1161655.png'  // 4: ダイヤ
    ];

    const reels = [
        document.getElementById('reel0'),
        document.getElementById('reel1'),
        document.getElementById('reel2')
    ];
    const stopButtons = document.querySelectorAll('.stop-button');
    const spinButton = document.getElementById('spin-button');

    let isSpinning = [false, false, false];
    let timers = [null, null, null];

    // 初期状態の画像設定
    window.onload = () => {
        reels.forEach(reel => {
            const content = reel.querySelector('.reel-content');
            content.style.backgroundImage = `url(${itemImages[2]})`; // 初期は7
        });
    };

    // SPINボタンが押されたとき
    spinButton.addEventListener('click', () => {
        spinButton.disabled = true;
        
        reels.forEach((reel, i) => {
            isSpinning[i] = true;
            reel.classList.add('is-spinning');
            stopButtons[i].disabled = false;
            
            // 高速で画像を切り替える
            timers[i] = setInterval(() => {
                const content = reel.querySelector('.reel-content');
                const randomIdx = Math.floor(Math.random() * itemImages.length);
                content.style.backgroundImage = `url(${itemImages[randomIdx]})`;
                content.dataset.value = randomIdx; // 判定用に数値を保存
            }, 60);
        });
    });

    // 各STOPボタンが押されたとき
    stopButtons.forEach((btn) => {
        btn.addEventListener('click', (e) => {
            const idx = e.target.dataset.index;
            
            // 停止処理
            clearInterval(timers[idx]);
            reels[idx].classList.remove('is-spinning');
            isSpinning[idx] = false;
            btn.disabled = true;

            // すべて止まったかチェック
            if (isSpinning.every(state => state === false)) {
                checkResult();
                spinButton.disabled = false;
            }
        });
    });

    // あたり判定
    function checkResult() {
        const v0 = reels[0].querySelector('.reel-content').dataset.value;
        const v1 = reels[1].querySelector('.reel-content').dataset.value;
        const v2 = reels[2].querySelector('.reel-content').dataset.value;

        if (v0 === v1 && v1 === v2) {
            // 少し遅らせてお祝い
            setTimeout(() => {
                alert('🎉🎉 ジャックポット！おめでとうございます！ 🎉🎉');
            }, 200);
        }
    }
</script>

</body>
</html>
